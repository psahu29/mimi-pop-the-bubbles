<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pop the Bubbles!</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100%;
    background: linear-gradient(to bottom, #87CEEB, #b3e5fc);
    touch-action: none;
    font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
  }
  #gameArea {
    position: relative;
    width: 100%;
    height: 100%;
  }
  .bubble {
    position: absolute;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: inset -5px -5px 15px rgba(255,255,255,0.6), inset 5px 5px 15px rgba(0,0,0,0.1);
    animation: float linear infinite;
    user-select: none;
  }
  .emoji {
    pointer-events: none;
  }
  @keyframes float {
    0%   { transform: translateY(0) translateX(0); }
    50%  { transform: translateY(-30px) translateX(10px); }
    100% { transform: translateY(0) translateX(0); }
  }
  .pop {
    animation: popAnim 0.3s forwards !important;
  }
  @keyframes popAnim {
    0%   { transform: scale(1); opacity: 1; }
    100% { transform: scale(1.8); opacity: 0; }
  }
  #score {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 28px;
    color: white;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    z-index: 10;
  }
  .confetti {
    position: absolute;
    top: -20px;
    border-radius: 2px;
    animation: fall linear forwards;
    z-index: 20;
  }
  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0.9; }
  }
  #cheer {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    font-size: 48px;
    font-weight: bold;
    color: #FF6B9D;
    text-shadow: 3px 3px 0 white, -1px -1px 0 white, 1px -1px 0 white, -1px 1px 0 white;
    z-index: 30;
    opacity: 0;
    pointer-events: none;
    transition: all 0.4s ease;
    text-align: center;
  }
  #cheer.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1.1);
  }
</style>
</head>
<body>

<div id="gameArea">
  <div id="score">🎈 0</div>
  <div id="cheer"></div>
</div>

<script>
const gameArea = document.getElementById('gameArea');
const scoreEl = document.getElementById('score');
const cheerEl = document.getElementById('cheer');
let score = 0;

const colors = [
  ['#FF6B9D', '#FF8FB3'],
  ['#FFD166', '#FFE08A'],
  ['#06D6A0', '#5CE8C4'],
  ['#4D96FF', '#7FB8FF'],
  ['#9D4EDD', '#C77DFF'],
  ['#FF9F1C', '#FFBE6B']
];

const emojis = ['🐶','🐱','⭐','🌸','🐰','🦋','🐠','🌈','🍓','🐥','🌼','🐢'];

const cheerMessages = ['Yay!! 🎉','Wow! Amazing!','Great job!! ⭐','You did it! 🎊','Super star!! 🌟','Woohoo!! 🎈'];

// Simple pleasant "pop" sound using Web Audio API (no files needed, fully offline)
let audioCtx;
function playPop(pitchBoost) {
  pitchBoost = pitchBoost || 0;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(600 + Math.random() * 300 + pitchBoost, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.15);
    g.gain.setValueAtTime(0.3, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
    o.connect(g);
    g.connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + 0.15);
  } catch (e) {}
}

function speakNumber(n) {
  try {
    const utter = new SpeechSynthesisUtterance(n.toString());
    utter.rate = 0.9;
    utter.pitch = 1.3;
    speechSynthesis.speak(utter);
  } catch (e) {}
}

function speakCheer(msg) {
  try {
    const utter = new SpeechSynthesisUtterance(msg);
    utter.rate = 0.95;
    utter.pitch = 1.4;
    speechSynthesis.speak(utter);
  } catch (e) {}
}

function launchConfetti() {
  const confettiColors = ['#FF6B9D','#FFD166','#06D6A0','#4D96FF','#9D4EDD','#FF9F1C'];
  for (let i = 0; i < 40; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti';
    const size = 6 + Math.random() * 8;
    piece.style.width = size + 'px';
    piece.style.height = size + 'px';
    piece.style.left = Math.random() * window.innerWidth + 'px';
    piece.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
    const duration = 2 + Math.random() * 1.5;
    piece.style.animationDuration = duration + 's';
    gameArea.appendChild(piece);
    setTimeout(() => piece.remove(), duration * 1000 + 100);
  }
}

function showCheer() {
  const msg = cheerMessages[Math.floor(Math.random() * cheerMessages.length)];
  cheerEl.textContent = msg;
  cheerEl.classList.add('show');
  speakCheer(msg);
  launchConfetti();
  setTimeout(() => cheerEl.classList.remove('show'), 1800);
}

function createBubble(size, x, y, isChild) {
  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  size = size || (60 + Math.random() * 70);
  const colorPair = colors[Math.floor(Math.random() * colors.length)];
  x = (x !== undefined) ? Math.max(0, Math.min(x, window.innerWidth - size)) : Math.random() * (window.innerWidth - size);
  y = (y !== undefined) ? Math.max(40, Math.min(y, window.innerHeight - size)) : Math.random() * (window.innerHeight - size - 40) + 40;
  const duration = 2 + Math.random() * 2;

  bubble.style.width = size + 'px';
  bubble.style.height = size + 'px';
  bubble.style.left = x + 'px';
  bubble.style.top = y + 'px';
  bubble.style.background = `radial-gradient(circle at 30% 30%, ${colorPair[1]}, ${colorPair[0]})`;
  bubble.style.animationDuration = duration + 's';

  const emojiSpan = document.createElement('span');
  emojiSpan.className = 'emoji';
  emojiSpan.style.fontSize = (size * 0.5) + 'px';
  emojiSpan.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  bubble.appendChild(emojiSpan);

  function pop(e) {
    e.preventDefault();
    if (bubble.classList.contains('pop')) return;
    bubble.classList.add('pop');

    const rect = bubble.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    score++;
    scoreEl.textContent = '🎈 ' + score;

    // Pitch rises slightly with consecutive pops, resets each 10
    const pitchBoost = (score % 10) * 15;
    playPop(pitchBoost);
    speakNumber(score);

    // Big bubbles split into a couple of smaller ones when popped
    if (size > 90 && !isChild) {
      const childSize = size * 0.5;
      setTimeout(() => {
        createBubble(childSize, cx - childSize - 5, cy - childSize / 2, true);
        createBubble(childSize, cx + 5, cy - childSize / 2, true);
      }, 80);
    }

    // Milestone cheer + confetti every 10 pops
    if (score % 10 === 0) {
      setTimeout(showCheer, 200);
    }

    setTimeout(() => bubble.remove(), 300);
  }

  bubble.addEventListener('pointerdown', pop);

  gameArea.appendChild(bubble);

  // Remove bubble after a while if never popped, to keep things tidy
  setTimeout(() => {
    if (bubble.parentNode) bubble.remove();
  }, 15000);
}

// Keep a steady supply of bubbles on screen
setInterval(() => {
  if (gameArea.querySelectorAll('.bubble').length < 8) {
    createBubble();
  }
}, 700);

// Create a few bubbles right away
for (let i = 0; i < 5; i++) createBubble();
</script>

</body>
</html>
